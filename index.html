<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>地層3Dソリッドモデラー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background-color: #0f172a; color: white; overflow: hidden; }
        #canvas-container { width: 100%; height: 60vh; position: relative; }
        .ui-panel { height: 40vh; overflow-y: auto; background: #1e293b; border-top: 2px solid #334155; }
        .drop-zone { 
            aspect-ratio: 4/3; border: 2px dashed #6366f1; cursor: pointer;
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <div class="absolute top-4 left-4 z-10">
        <h1 class="text-xl font-bold text-indigo-400">地層3Dモデラー</h1>
        <input id="v-scale" type="range" min="1" max="20" step="0.5" value="5" class="mt-2">
        <span class="text-xs block">垂直倍率</span>
    </div>
    <div class="absolute top-4 right-4 z-10">
        <button onclick="analyzeAndBuild()" class="bg-indigo-600 px-6 py-2 rounded-full font-bold shadow-xl">🚀 3Dモデル生成</button>
    </div>
</div>

<div class="ui-panel p-6">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-5xl mx-auto">
        <div onclick="triggerInput(0)" id="drop-0" class="drop-zone flex items-center justify-center text-xs">北</div>
        <div onclick="triggerInput(1)" id="drop-1" class="drop-zone flex items-center justify-center text-xs">西</div>
        <div onclick="triggerInput(2)" id="drop-2" class="drop-zone flex items-center justify-center text-xs">南</div>
        <div onclick="triggerInput(3)" id="drop-3" class="drop-zone flex items-center justify-center text-xs">東</div>
    </div>
</div>

<input type="file" id="file-input" class="hidden" accept="image/*">

<script>
    let scene, camera, renderer, modelGroup;
    let imageStates = [null, null, null, null];
    let currentTargetIdx = 0;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight * 0.6), 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        modelGroup = new THREE.Group();
        scene.add(modelGroup);
        camera.position.set(15, 12, 15);
        camera.lookAt(0, 0, 0);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (modelGroup) modelGroup.rotation.y += 0.005;
        renderer.render(scene, camera);
    }

    // --- ここがスイッチの連鎖 ---
    function triggerInput(idx) {
        currentTargetIdx = idx;
        document.getElementById('file-input').click(); // OSのファイル選択を開く
    }

    document.getElementById('file-input').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            imageStates[currentTargetIdx] = event.target.result;
            const drop = document.getElementById(`drop-${currentTargetIdx}`);
            drop.style.backgroundImage = `url(${event.target.result})`;
            drop.innerText = ""; // 文字を消す
        };
        reader.readAsDataURL(file);
    };

    // --- 3D生成の核心部分 ---
    async function analyzeAndBuild() {
        // 全ての画像を解析
        const allData = [];
        for (let i = 0; i < 4; i++) {
            if (!imageStates[i]) {
                alert("全ての画像を選択してください");
                return;
            }
            allData.push(await analyzeImage(imageStates[i]));
        }

        // 古いモデルを消す
        while(modelGroup.children.length > 0) modelGroup.remove(modelGroup.children[0]);

        const vScale = parseFloat(document.getElementById('v-scale').value);
        const boxSize = 10;
        
        // とりあえず「北(0)」の層構造をベースに「ようかん」を作る
        let currentY = -(5 * vScale);
        allData[0].forEach(layer => {
            const h = (10 * layer.ratio) * vScale;
            if (h <= 0) return;

            const geo = new THREE.BoxGeometry(boxSize, h, boxSize);
            const mat = new THREE.MeshPhongMaterial({ 
                color: layer.type === "sand" ? 0x22c55e : 0x92400e,
                transparent: true,
                opacity: 0.9
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = currentY + h/2;
            modelGroup.add(mesh);
            currentY += h;
        });
    }

    function analyzeImage(url) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas');
                const ctx = cvs.getContext('2d');
                cvs.width = 50; cvs.height = 50;
                ctx.drawImage(img, 0, 0, 50, 50);
                const pix = ctx.getImageData(25, 0, 1, 50).data;
                let layers = [];
                for(let i=0; i<50; i++) {
                    const r = pix[i*4], g = pix[i*4+1], b = pix[i*4+2];
                    layers.push((g > r && g > b) ? "sand" : "mud");
                }
                resolve(compress(layers));
            };
            img.src = url;
        });
    }

    function compress(arr) {
        let res = [], cur = arr[0], count = 0;
        arr.forEach(v => { if(v === cur) count++; else { res.push({type:cur, ratio:count/50}); cur=v; count=1; }});
        res.push({type:cur, ratio:count/50});
        return res;
    }

    window.onload = init;
</script>
</body>
</html>
