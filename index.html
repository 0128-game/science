<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地層3Dソリッドモデラー (ようかん版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { margin: 0; background-color: #1e1b4b; color: white; font-family: sans-serif; overflow: hidden; }
        #canvas-container { width: 100%; height: 60vh; position: relative; background: radial-gradient(circle, #2e1065 0%, #020617 100%); }
        .ui-panel { height: 40vh; overflow-y: auto; background: rgba(30, 27, 75, 0.95); border-top: 2px solid #4c1d95; }
        .drop-zone { 
            aspect-ratio: 4/3; 
            border: 2px dashed #7c3aed; 
            transition: all 0.2s; 
            background-size: cover; 
            background-position: center; 
            cursor: pointer;
            position: relative;
        }
        .drop-zone:hover { border-color: #a78bfa; background-color: rgba(124, 58, 237, 0.1); }
        .layer-sand { background-color: #22c55e; } /* 砂岩：緑 */
        .layer-mud { background-color: #92400e; }  /* 泥岩：茶 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 4px; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div class="absolute top-4 left-4 z-10 space-y-2">
        <h1 class="text-xl font-bold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-300">
            地層3Dソリッドモデラー <span class="text-sm font-normal text-white/70">ようかん版〚完全版〛</span>
        </h1>
        <div class="flex gap-2">
            <div class="flex items-center gap-2 bg-black/40 p-2 rounded-lg backdrop-blur-md border border-white/10">
                <span class="text-xs">垂直倍率:</span>
                <input id="v-scale" type="range" min="1" max="20" step="0.5" value="7.5" class="w-24">
                <span id="v-scale-val" class="text-xs font-mono w-8">7.5x</span>
            </div>
        </div>
    </div>

    <div class="absolute bottom-4 left-4 z-10 flex gap-4 text-xs bg-black/40 p-3 rounded-lg border border-white/10">
        <div class="flex items-center gap-1"><div class="w-3 h-3 layer-sand rounded-sm"></div>砂岩(緑)</div>
        <div class="flex items-center gap-1"><div class="w-3 h-3 layer-mud rounded-sm"></div>泥岩(茶)</div>
    </div>

    <div class="absolute top-4 right-4 z-10 flex flex-col gap-2">
        <button onclick="analyzeAndBuild()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-full font-bold shadow-lg transition-all transform active:scale-95">
            🚀 3Dモデル生成
        </button>
        <button onclick="toggleAIModal()" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded-full font-bold shadow-lg transition-all flex items-center justify-center gap-2">
            ✨ AI解説
        </button>
        <button onclick="showColumnarSection()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-full font-bold shadow-lg transition-all flex items-center justify-center gap-2 text-sm">
            📊 中央柱状図
        </button>
    </div>
</div>

<div class="ui-panel p-6">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-5xl mx-auto">
        <div class="space-y-1 text-center">
            <span class="text-xs font-bold text-purple-300 uppercase tracking-widest">NORTH (北)</span>
            <div id="drop-0" onclick="triggerInput(0)" class="drop-zone flex items-center justify-center rounded-xl">
                <span class="text-white/30 text-xs">画像を選択</span>
            </div>
        </div>
        <div class="space-y-1 text-center">
            <span class="text-xs font-bold text-purple-300 uppercase tracking-widest">WEST (西)</span>
            <div id="drop-1" onclick="triggerInput(1)" class="drop-zone flex items-center justify-center rounded-xl">
                <span class="text-white/30 text-xs">画像を選択</span>
            </div>
        </div>
        <div class="space-y-1 text-center">
            <span class="text-xs font-bold text-purple-300 uppercase tracking-widest">SOUTH (南)</span>
            <div id="drop-2" onclick="triggerInput(2)" class="drop-zone flex items-center justify-center rounded-xl">
                <span class="text-white/30 text-xs">画像を選択</span>
            </div>
        </div>
        <div class="space-y-1 text-center">
            <span class="text-xs font-bold text-purple-300 uppercase tracking-widest">EAST (東)</span>
            <div id="drop-3" onclick="triggerInput(3)" class="drop-zone flex items-center justify-center rounded-xl">
                <span class="text-white/30 text-xs">画像を選択</span>
            </div>
        </div>
    </div>

    <div class="mt-8 max-w-2xl mx-auto bg-white/5 p-4 rounded-xl border border-white/10">
        <h3 class="text-sm font-bold mb-2 flex items-center gap-2">
            <span class="w-2 h-2 bg-purple-500 rounded-full animate-pulse"></span>
            Gemini API 設定
        </h3>
        <input id="api-key" type="password" placeholder="APIキーを入力してください" class="w-full bg-black/40 border border-white/20 p-2 rounded text-sm focus:outline-none focus:border-purple-500">
    </div>
</div>

<input type="file" id="file-input" class="hidden" accept="image/*">

<div id="ai-modal" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-purple-500 w-full max-w-3xl max-h-[80vh] rounded-2xl overflow-hidden flex flex-col shadow-2xl">
        <div class="p-4 border-b border-purple-500 flex justify-between items-center bg-purple-900/20">
            <h2 class="font-bold flex items-center gap-2">✨ AIによる地層解説</h2>
            <button onclick="toggleAIModal()" class="text-white hover:text-purple-300">✕</button>
        </div>
        <div id="ai-content" class="p-6 overflow-y-auto prose prose-invert max-w-none text-sm"></div>
    </div>
</div>

<div id="column-modal" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-500 w-full max-w-md rounded-2xl overflow-hidden shadow-2xl p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold">📊 中央柱状図</h2>
            <button onclick="document.getElementById('column-modal').classList.add('hidden')" class="text-white/50 hover:text-white">✕</button>
        </div>
        <div id="column-viz" class="w-32 mx-auto h-80 border-2 border-white/20 relative bg-black/20 flex flex-col-reverse"></div>
    </div>
</div>

<script>
    // --- 初期変数 ---
    const directions = ["北", "西", "南", "東"];
    let imageStates = [null, null, null, null];
    let currentTargetIdx = 0;
    let scene, camera, renderer, modelGroup;
    let rawStrataData = []; 

    // --- Three.js 初期化 ---
    function initScene() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight * 0.6), 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        modelGroup = new THREE.Group();
        scene.add(modelGroup);

        camera.position.set(18, 12, 18);
        camera.lookAt(0, 0, 0);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (modelGroup) modelGroup.rotation.y += 0.003;
        renderer.render(scene, camera);
    }

    // --- 画像選択処理 ---
    function triggerInput(idx) {
        currentTargetIdx = idx;
        document.getElementById('file-input').click();
    }

    document.getElementById('file-input').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            imageStates[currentTargetIdx] = event.target.result;
            const dropZone = document.getElementById(`drop-${currentTargetIdx}`);
            dropZone.style.backgroundImage = `url(${event.target.result})`;
            dropZone.innerHTML = `<div class="absolute inset-0 bg-indigo-900/40 flex items-center justify-center"><span class="text-white text-xs font-bold">${directions[currentTargetIdx]}</span></div>`;
        };
        reader.readAsDataURL(file);
    };

    // --- 解析とビルド ---
    async function analyzeAndBuild() {
        if (imageStates.includes(null)) {
            alert("4方位すべての画像を選択してください。");
            return;
        }
        rawStrataData = [];
        for (let i = 0; i < 4; i++) {
            rawStrataData.push(await analyzeImage(imageStates[i]));
        }
        build3DModel();
    }

    function analyzeImage(dataUrl) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 50; canvas.height = 50;
                ctx.drawImage(img, 0, 0, 50, 50);
                const pixels = ctx.getImageData(0, 0, 50, 50).data;
                
                // 中央の縦軸をスキャン
                let layers = [];
                for (let y = 0; y < 50; y++) {
                    const idx = (y * 50 + 25) * 4;
                    layers.push(classifyColor(pixels[idx], pixels[idx+1], pixels[idx+2]));
                }
                resolve(compressLayers(layers));
            };
            img.src = dataUrl;
        });
    }

    function classifyColor(r, g, b) {
        // 緑っぽければ砂岩、それ以外は泥岩（簡易判定）
        return (g > r && g > b) ? "sand" : "mud";
    }

    function compressLayers(arr) {
        let res = [];
        let cur = arr[0], count = 0;
        arr.forEach(v => {
            if (v === cur) count++;
            else {
                res.push({ type: cur, ratio: count / arr.length });
                cur = v; count = 1;
            }
        });
        res.push({ type: cur, ratio: count / arr.length });
        return res;
    }

    // --- 3D描画ロジック ---
    function build3DModel() {
        while (modelGroup.children.length > 0) modelGroup.remove(modelGroup.children[0]);
        const vScale = parseFloat(document.getElementById('v-scale').value);
        const TOTAL_H = 10;
        
        // 北(0)と南(2)のデータを補間して中央値を出す
        const centerData = interpolate(rawStrataData[0], rawStrataData[2]);
        const size = 10;
        let currentY = -(TOTAL_H * vScale) / 2;

        centerData.forEach(layer => {
            const h = (TOTAL_H * layer.ratio) * vScale;
            if (h <= 0) return;
            const geom = new THREE.BoxGeometry(size, h, size);
            const mat = new THREE.MeshPhongMaterial({
                color: layer.type === "sand" ? 0x22c55e : 0x92400e,
                shininess: 5
            });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.y = currentY + h / 2;
            modelGroup.add(mesh);
            currentY += h;
        });
    }

    function interpolate(a, b) {
        const res = [];
        const len = Math.max(a.length, b.length);
        for (let i = 0; i < len; i++) {
            res.push({
                type: a[i % a.length].type,
                ratio: 1 / len
            });
        }
        return res;
    }

    // --- AI解説 ---
    async function toggleAIModal() {
        const modal = document.getElementById('ai-modal');
        modal.classList.toggle('hidden');
        if (!modal.classList.contains('hidden')) {
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) {
                document.getElementById('ai-content').innerText = "APIキーを入力してください。";
                return;
            }
            document.getElementById('ai-content').innerText = "AI解析中...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "地質学の専門家として、砂岩と泥岩の互層が示す環境変化を中学生向けに短く解説して。" }] }] })
                });
                const data = await response.json();
                document.getElementById('ai-content').innerHTML = marked.parse(data.candidates[0].content.parts[0].text);
            } catch (e) {
                document.getElementById('ai-content').innerText = "通信エラーが発生しました。";
            }
        }
    }

    // --- 柱状図表示 ---
    function showColumnarSection() {
        if (rawStrataData.length === 0) return;
        document.getElementById('column-modal').classList.remove('hidden');
        const viz = document.getElementById('column-viz');
        viz.innerHTML = '';
        const data = interpolate(rawStrataData[0], rawStrataData[2]);
        data.forEach(l => {
            const div = document.createElement('div');
            div.style.height = `${l.ratio * 100}%`;
            div.className = l.type === "sand" ? "layer-sand w-full border-t border-black/10" : "layer-mud w-full border-t border-black/10";
            viz.appendChild(div);
        });
    }

    document.getElementById('v-scale').oninput = (e) => {
        document.getElementById('v-scale-val').innerText = e.target.value + "x";
        if (rawStrataData.length > 0) build3DModel();
    };

    window.onload = initScene;
    window.onresize = () => {
        camera.aspect = window.innerWidth / (window.innerHeight * 0.6);
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
    };
</script>
</body>
</html>
