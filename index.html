<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地層3Dソリッドモデラー 〚0126〛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: radial-gradient(circle at center, #2e1065, #0f172a); min-height: 100vh; color: white; font-family: 'sans-serif'; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        canvas { border-radius: 0.5rem; }
        .drop-zone { border: 2px dashed rgba(255, 255, 255, 0.3); transition: all 0.3s; cursor: pointer; }
        .drop-zone:hover { border-color: #a78bfa; background: rgba(167, 139, 250, 0.1); }
        .hidden-input { display: none; }
        #ai-overlay { display: none; background: rgba(0,0,0,0.85); }
        .prose { color: #e2e8f0; max-width: none; }
        .prose h1, .prose h2, .prose h3 { color: #a78bfa; margin-top: 1rem; margin-bottom: 0.5rem; border-bottom: 1px solid #4c1d95; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-8 text-center">
        <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-indigo-300">
            地層3Dソリッドモデラー <span class="text-sm font-normal text-purple-200">授業用ver.1 〚0126〛</span>
        </h1>
        <p class="text-gray-400 mt-2">ようかんモデルの写真を4枚読み込み、地層を3Dで復元します。</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- UI Side -->
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-panel p-6">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <span class="w-2 h-6 bg-purple-500 rounded-full"></span> 写真読み込み
                </h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <!-- North -->
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400">1. 北 (North)</label>
                        <div id="drop-n" class="drop-zone aspect-video flex items-center justify-center relative overflow-hidden rounded-md" onclick="document.getElementById('file-n').click()">
                            <span class="text-xs text-gray-500">＋</span>
                            <img id="prev-n" class="absolute inset-0 w-full h-full object-cover hidden">
                        </div>
                        <input type="file" id="file-n" class="hidden-input" accept="image/*" onchange="handleImage(this, 'n')">
                    </div>
                    <!-- West -->
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400">2. 西 (West)</label>
                        <div id="drop-w" class="drop-zone aspect-video flex items-center justify-center relative overflow-hidden rounded-md" onclick="document.getElementById('file-w').click()">
                            <span class="text-xs text-gray-500">＋</span>
                            <img id="prev-w" class="absolute inset-0 w-full h-full object-cover hidden">
                        </div>
                        <input type="file" id="file-w" class="hidden-input" accept="image/*" onchange="handleImage(this, 'w')">
                    </div>
                    <!-- South -->
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400">3. 南 (South)</label>
                        <div id="drop-s" class="drop-zone aspect-video flex items-center justify-center relative overflow-hidden rounded-md" onclick="document.getElementById('file-s').click()">
                            <span class="text-xs text-gray-500">＋</span>
                            <img id="prev-s" class="absolute inset-0 w-full h-full object-cover hidden">
                        </div>
                        <input type="file" id="file-s" class="hidden-input" accept="image/*" onchange="handleImage(this, 's')">
                    </div>
                    <!-- East -->
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400">4. 東 (East)</label>
                        <div id="drop-e" class="drop-zone aspect-video flex items-center justify-center relative overflow-hidden rounded-md" onclick="document.getElementById('file-e').click()">
                            <span class="text-xs text-gray-500">＋</span>
                            <img id="prev-e" class="absolute inset-0 w-full h-full object-cover hidden">
                        </div>
                        <input type="file" id="file-e" class="hidden-input" accept="image/*" onchange="handleImage(this, 'e')">
                    </div>
                </div>

                <div class="mt-6 flex flex-col gap-2">
                    <button onclick="generateModel()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-lg font-bold transition-all shadow-lg shadow-indigo-900/20">
                        3Dモデルを構築
                    </button>
                    <div class="flex gap-2">
                        <button onclick="showAIAnalysis()" class="flex-1 bg-purple-700 hover:bg-purple-600 py-2 rounded-lg text-sm transition-all flex items-center justify-center gap-1">
                            ✨ AI解説
                        </button>
                        <button onclick="showCenterChart()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-sm transition-all flex items-center justify-center gap-1">
                            📊 中央柱状図
                        </button>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-6">
                <h2 class="text-sm font-semibold mb-3 text-gray-300">凡例・設定</h2>
                <div class="space-y-3">
                    <div class="flex items-center gap-3 text-xs">
                        <span class="w-4 h-4 bg-[#22c55e] rounded border border-white/20"></span> 砂岩（緑）
                        <span class="w-4 h-4 bg-[#92400e] rounded border border-white/20 ml-2"></span> 泥岩（茶）
                    </div>
                    <div class="flex items-center gap-3 text-xs opacity-40">
                        <span class="w-4 h-4 bg-[#facc15] rounded"></span> 礫岩
                        <span class="w-4 h-4 bg-[#6b7280] rounded"></span> その他
                    </div>
                    <hr class="border-white/10">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-400">垂直倍率 (V-Scale)</label>
                        <input type="range" id="v-scale" min="1" max="15" step="0.5" value="7.5" class="w-full accent-purple-500" oninput="updateVScale()">
                    </div>
                </div>
            </div>
        </div>

        <!-- Canvas Side -->
        <div class="lg:col-span-8 space-y-4">
            <div id="canvas-container" class="glass-panel w-full aspect-square md:aspect-video relative overflow-hidden bg-black/20">
                <div id="loading-spinner" class="absolute inset-0 flex items-center justify-center hidden bg-black/40 z-10">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-white"></div>
                </div>
                <!-- Three.js will inject here -->
            </div>
            <div class="flex justify-between items-center text-[10px] text-gray-500">
                <p>マウス：回転　ホイール：拡大縮小　右ドラッグ：移動</p>
                <p>※写真は地層の縞模様が見えるように撮影してください</p>
            </div>
        </div>
    </main>

    <!-- AI Overlay -->
    <div id="ai-overlay" class="fixed inset-0 z-50 p-4 md:p-10 flex items-center justify-center overflow-auto">
        <div class="bg-slate-900 w-full max-w-4xl min-h-[70vh] rounded-2xl border border-purple-500/30 flex flex-col relative">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h2 id="ai-title" class="text-xl font-bold text-purple-300 flex items-center gap-2">✨ 地層のAI解析結果</h2>
                <button onclick="closeOverlay()" class="text-gray-400 hover:text-white p-2">✕</button>
            </div>
            <div id="ai-content" class="p-8 prose overflow-auto flex-1">
                解析中... APIキーが設定されていない場合は解説が表示されません。
            </div>
            <div class="p-4 border-t border-white/10 flex gap-4 bg-slate-950/50 rounded-b-2xl">
                <input type="password" id="api-key" placeholder="Gemini API Keyを入力してください" class="flex-1 bg-black/40 border border-white/20 rounded px-4 py-2 text-sm">
            </div>
        </div>
    </div>

    <script>
        /**
         * GLOBAL STATE & CONSTANTS
         */
        const IMAGES = { n: null, w: null, s: null, e: null };
        const ANALYZED_DATA = {}; // Points for 3D construction
        let renderer, scene, camera, controls, meshGroup;
        let vScale = 7.5;
        const apiKeyInput = document.getElementById('api-key');

        /**
         * IMAGE PROCESSING
         */
        function handleImage(input, direction) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        IMAGES[direction] = img;
                        const prev = document.getElementById('prev-' + direction);
                        prev.src = e.target.result;
                        prev.classList.remove('hidden');
                        document.getElementById('drop-' + direction).querySelector('span').classList.add('hidden');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function analyzeOneImage(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = 100;
            canvas.height = 200; // Resolution for analysis
            ctx.drawImage(img, 0, 0, 100, 200);

            const getPointData = (x) => {
                const imageData = ctx.getImageData(x, 0, 1, 200).data;
                const layers = [];
                let currentType = null;
                let currentHeight = 0;

                for (let y = 0; y < 200; y++) {
                    const r = imageData[y * 4];
                    const g = imageData[y * 4 + 1];
                    const b = imageData[y * 4 + 2];
                    
                    // HSV conversion
                    const max = Math.max(r, g, b) / 255;
                    const min = Math.min(r, g, b) / 255;
                    const v = max;
                    const s = max === 0 ? 0 : (max - min) / max;
                    let h = 0;
                    if (max !== min) {
                        if (max === r / 255) h = (g - b) / (max - min) / 255;
                        if (max === g / 255) h = 2 + (b - r) / (max - min) / 255;
                        if (max === b / 255) h = 4 + (r - g) / (max - min) / 255;
                        h *= 60; if (h < 0) h += 360;
                    }

                    // Validity Filter
                    if (v > 0.85 && s < 0.25) continue; // Reflection/Label
                    if (v < 0.08) continue; // Shadow
                    if (s < 0.05) continue; // Transparent

                    // Hybrid Logic: Green (Sandstone) vs Brown (Mudstone)
                    let type = 'brown'; // Default Mudstone
                    if ((h >= 25 && h <= 190) || (g > r * 0.8)) {
                        type = 'green';
                    }

                    if (type !== currentType) {
                        if (currentType !== null) layers.push({ type: currentType, h: currentHeight });
                        currentType = type;
                        currentHeight = 0;
                    }
                    currentHeight++;
                }
                if (currentType) layers.push({ type: currentType, h: currentHeight });

                // Normalize to total 10.0
                const total = layers.reduce((acc, l) => acc + l.h, 0);
                return layers.map(l => ({ type: l.type, h: (l.h / total) * 10 }));
            };

            // Analyze Left(25%) and Right(75%) as corner sources
            return {
                left: getPointData(25),
                right: getPointData(75)
            };
        }

        /**
         * 3D CONSTRUCTION
         */
        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(15, 10, 15);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            meshGroup = new THREE.Group();
            scene.add(meshGroup);

            // Simple Orbit Controls mock
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            container.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaMove = { x: e.offsetX - previousMousePosition.x, y: e.offsetY - previousMousePosition.y };
                meshGroup.rotation.y += deltaMove.x * 0.01;
                meshGroup.rotation.x += deltaMove.y * 0.01;
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            });

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
        }

        function generateModel() {
            if (!IMAGES.n || !IMAGES.w || !IMAGES.s || !IMAGES.e) {
                alert("4方位すべての写真を読み込んでください。");
                return;
            }

            meshGroup.clear();
            const res = {
                n: analyzeOneImage(IMAGES.n),
                w: analyzeOneImage(IMAGES.w),
                s: analyzeOneImage(IMAGES.s),
                e: analyzeOneImage(IMAGES.e)
            };

            // Corner Integration (Spec 4)
            // Points (Local Coords): NW, NE, SW, SE
            const NW = mergeColumns(res.n.left, res.w.right);
            const NE = mergeColumns(res.n.right, res.e.left);
            const SW = mergeColumns(res.s.right, res.w.left);
            const SE = mergeColumns(res.s.left, res.e.right);

            // Center Linear Interpolation (Spec 4)
            const N_Mid = interpolate(NW, NE);
            const W_Mid = interpolate(NW, SW);
            const S_Mid = interpolate(SW, SE);
            const E_Mid = interpolate(NE, SE);
            const Center = interpolate(N_Mid, S_Mid);

            const grid = [
                [NW, N_Mid, NE],
                [W_Mid, Center, E_Mid],
                [SW, S_Mid, SE]
            ];

            // Build Layered Geometry
            const colors = { green: 0x22c55e, brown: 0x92400e };
            let currentBase = Array(9).fill(0); // Tracking Y-base for each point

            // Assume layers are somewhat continuous for visualization
            // In a simplified 0126 model, we take the average layer structure
            const maxLayerCount = 20; 
            for (let l = 0; l < maxLayerCount; l++) {
                const layerGeom = new THREE.BufferGeometry();
                const vertices = [];
                const indices = [];
                let layerColor = null;

                // For each cell in 3x3 grid
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 3; c++) {
                        const pt = grid[r][c][l];
                        if (!pt) continue;
                        layerColor = colors[pt.type];
                        
                        const x = (c - 1) * 5;
                        const z = (r - 1) * 5;
                        const yBottom = currentBase[r * 3 + c] * vScale;
                        const yTop = (currentBase[r * 3 + c] + pt.h) * vScale;
                        
                        // Vertical column vertices
                        vertices.push(x, -yBottom, z); // bottom
                        vertices.push(x, -yTop, z);    // top
                        currentBase[r * 3 + c] += pt.h;
                    }
                }

                if (vertices.length === 0) break;

                // Construct triangles for a solid block (Simplified mesh)
                // This builds a grid-based surface. For a "Solid", we render planes.
                const mat = new THREE.MeshPhongMaterial({ color: layerColor, side: THREE.DoubleSide });
                const mesh = new THREE.Mesh(createGridMesh(vertices), mat);
                meshGroup.add(mesh);
            }
            
            // Re-center mesh group
            meshGroup.position.y = (10 * vScale) / 2;
        }

        function createGridMesh(verts) {
            // Simplified: creates a 2-layered plane mesh for the current stratum slice
            const geo = new THREE.BufferGeometry();
            const f32 = new Float32Array(verts);
            geo.setAttribute('position', new THREE.BufferAttribute(f32, 3));
            
            const indices = [];
            // Top surface (idx 1, 3, 5, 7, 9, 11, 13, 15, 17)
            const top = [1, 3, 5, 7, 9, 11, 13, 15, 17];
            indices.push(1, 3, 7, 7, 3, 9, 3, 5, 9, 9, 5, 11); // r0-r1
            indices.push(7, 9, 13, 13, 9, 15, 9, 11, 15, 15, 11, 17); // r1-r2
            
            // Side walls could be added here for a "Solid" look
            // For brevity and stability, we prioritize the layered plan look
            geo.setIndex(indices);
            geo.computeVertexNormals();
            return geo;
        }

        function mergeColumns(a, b) {
            // Average the layer heights of two sources for the same corner
            const result = [];
            const len = Math.max(a.length, b.length);
            for (let i = 0; i < len; i++) {
                const la = a[i] || { type: 'brown', h: 0 };
                const lb = b[i] || { type: 'brown', h: 0 };
                result.push({
                    type: la.h > lb.h ? la.type : lb.type, // Majority type
                    h: (la.h + lb.h) / 2
                });
            }
            return result;
        }

        function interpolate(a, b) {
            return mergeColumns(a, b); // Linear interpolation is equivalent to merge in this logic
        }

        function updateVScale() {
            vScale = parseFloat(document.getElementById('v-scale').value);
            generateModel();
        }

        /**
         * AI & TOOLS
         */
        async function showAIAnalysis() {
            const overlay = document.getElementById('ai-overlay');
            const content = document.getElementById('ai-content');
            overlay.style.display = 'flex';
            
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                content.innerHTML = "<p class='text-red-400'>Gemini APIキーを入力してください。写真はブラウザ内で解析されていますが、考察文の作成にはAPIが必要です。</p>";
                return;
            }

            content.innerHTML = "地層の重なりから環境の変遷を考察中...";

            // Prepare simple text data of the layers
            const northData = analyzeOneImage(IMAGES.n || new Image()).left.map(l => `${l.type === 'green' ? '砂岩' : '泥岩'}(${l.h.toFixed(1)})`).join(' → ');
            
            const prompt = `あなたは地学の先生です。以下の「ようかん地層モデル」の解析データ（下から上の順）に基づき、この地域の堆積環境の変化を中学生にも分かりやすく解説してください。
            【解析データ】: ${northData}
            【条件】: 砂岩（緑）は海岸に近い浅い海、泥岩（茶）は海岸から遠い深い海で積もります。
            【出力】: 1.地層の構成、2.推測される環境の変化（海が深くなったか浅くなったか）、3.まとめ。マークダウン形式で。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                content.innerHTML = marked.parse(text);
            } catch (err) {
                content.innerHTML = "エラーが発生しました。APIキーを確認してください。";
            }
        }

        function showCenterChart() {
            const overlay = document.getElementById('ai-overlay');
            const content = document.getElementById('ai-content');
            const title = document.getElementById('ai-title');
            title.innerText = "📊 中央推定柱状図";
            overlay.style.display = 'flex';

            if (!IMAGES.n) { content.innerHTML = "データがありません。"; return; }

            // Re-calculate center
            const res = { n: analyzeOneImage(IMAGES.n), w: analyzeOneImage(IMAGES.w), s: analyzeOneImage(IMAGES.s), e: analyzeOneImage(IMAGES.e) };
            const NW = mergeColumns(res.n.left, res.w.right);
            const NE = mergeColumns(res.n.right, res.e.left);
            const SW = mergeColumns(res.s.right, res.w.left);
            const SE = mergeColumns(res.s.left, res.e.right);
            const center = interpolate(interpolate(NW, NE), interpolate(SW, SE));

            let html = `<div class='flex flex-col items-center'><div class='w-32 border-2 border-white/20 flex flex-col-reverse'>`;
            center.forEach(l => {
                const color = l.type === 'green' ? '#22c55e' : '#92400e';
                html += `<div style="height: ${l.h * 30}px; background: ${color};" class="w-full flex items-center justify-center text-[10px] border-t border-black/20">${l.type==='green'?'砂':'泥'}</div>`;
            });
            html += `</div><p class='mt-4 text-sm'>中央地点の推定データ（全方位の角データより算出）</p></div>`;
            content.innerHTML = html;
        }

        function closeOverlay() {
            document.getElementById('ai-overlay').style.display = 'none';
            document.getElementById('ai-title').innerText = "✨ 地層のAI解析結果";
        }

        window.onload = () => {
            initThreeJS();
            // Default cube for visual
            const geo = new THREE.BoxGeometry(10, 5, 10);
            const mat = new THREE.MeshPhongMaterial({ color: 0x4c1d95, transparent: true, opacity: 0.3, wireframe: true });
            meshGroup.add(new THREE.Mesh(geo, mat));
        };

        window.onresize = () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        };
    </script>
</body>
</html>
