<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>真・地層3Dソリッドモデラー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="bg-slate-900 text-white overflow-hidden">

<div id="canvas-container" class="w-full h-[60vh] relative">
    <div class="absolute top-4 left-4 z-10">
        <h1 class="text-xl font-bold text-indigo-400">3D地層解析ソリッドエンジン</h1>
        <div class="bg-black/50 p-3 rounded mt-2 text-[10px] text-white/70">
            垂直倍率：1.0x (固定)
        </div>
    </div>
    <button onclick="analyzeAndBuild()" class="absolute top-4 right-4 z-10 bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-full font-bold shadow-2xl transition-all active:scale-95">
        🚀 4方位相関解析を実行
    </button>
</div>

<div class="h-[40vh] p-6 bg-slate-800 border-t-2 border-slate-700 overflow-y-auto">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-5xl mx-auto">
        <div onclick="triggerInput(0)" id="drop-0" class="aspect-video border-2 border-dashed border-indigo-500 rounded-lg flex items-center justify-center cursor-pointer hover:bg-indigo-500/10 transition-all text-xs">北面(N)</div>
        <div onclick="triggerInput(1)" id="drop-1" class="aspect-video border-2 border-dashed border-indigo-500 rounded-lg flex items-center justify-center cursor-pointer hover:bg-indigo-500/10 transition-all text-xs">西面(W)</div>
        <div onclick="triggerInput(2)" id="drop-2" class="aspect-video border-2 border-dashed border-indigo-500 rounded-lg flex items-center justify-center cursor-pointer hover:bg-indigo-500/10 transition-all text-xs">南面(S)</div>
        <div onclick="triggerInput(3)" id="drop-3" class="aspect-video border-2 border-dashed border-indigo-500 rounded-lg flex items-center justify-center cursor-pointer hover:bg-indigo-500/10 transition-all text-xs">東面(E)</div>
    </div>
</div>

<input type="file" id="file-input" class="hidden" accept="image/*">

<script>
    let scene, camera, renderer, modelGroup;
    let imageStates = [null, null, null, null];
    let currentTargetIdx = 0;

    // --- 3D Scene Setup ---
    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight * 0.6), 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const light1 = new THREE.DirectionalLight(0xffffff, 1);
        light1.position.set(10, 20, 10);
        scene.add(light1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        modelGroup = new THREE.Group();
        scene.add(modelGroup);
        camera.position.set(15, 12, 15);
        camera.lookAt(0, 0, 0);

        const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        grid.position.y = -5.1;
        scene.add(grid);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (modelGroup) modelGroup.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    function triggerInput(idx) {
        currentTargetIdx = idx;
        document.getElementById('file-input').click();
    }

    document.getElementById('file-input').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            imageStates[currentTargetIdx] = ev.target.result;
            const drop = document.getElementById(`drop-${currentTargetIdx}`);
            drop.style.backgroundImage = `url(${ev.target.result})`;
            drop.style.backgroundSize = 'cover';
            drop.innerText = "";
        };
        reader.readAsDataURL(file);
    };

    // --- 3D解析・構築ロジック ---
    async function analyzeAndBuild() {
        if (imageStates.includes(null)) {
            alert("解析には4方位すべての画像が必要です。");
            return;
        }

        const analysisResults = [];
        for (let i = 0; i < 4; i++) {
            analysisResults.push(await processImagePixels(imageStates[i]));
        }

        while(modelGroup.children.length > 0) modelGroup.remove(modelGroup.children[0]);

        const TOTAL_HEIGHT = 10;
        const SIZE = 10;
        const V_SCALE = 1.0; // 固定倍率

        const layerCount = analysisResults[0].length;
        let currentBaseHeights = [0, 0, 0, 0]; // NW, SW, SE, NE

        for (let l = 0; l < layerCount; l++) {
            // 各面の比率から厚みを計算 (V_SCALEを掛けても1なので結果は等倍)
            const hN = (analysisResults[0][l]?.ratio || 0) * TOTAL_HEIGHT * V_SCALE;
            const hW = (analysisResults[1][l]?.ratio || 0) * TOTAL_HEIGHT * V_SCALE;
            const hS = (analysisResults[2][l]?.ratio || 0) * TOTAL_HEIGHT * V_SCALE;
            const hE = (analysisResults[3][l]?.ratio || 0) * TOTAL_HEIGHT * V_SCALE;

            // 四隅の厚みを相関解析
            const thickNW = (hN + hW) / 2;
            const thickSW = (hW + hS) / 2;
            const thickSE = (hS + hE) / 2;
            const thickNE = (hE + hN) / 2;

            const geometry = createDeformedBox(SIZE, currentBaseHeights, [thickNW, thickSW, thickSE, thickNE]);
            const material = new THREE.MeshPhongMaterial({
                color: analysisResults[0][l].type === "sand" ? 0x22c55e : 0x92400e,
                side: THREE.DoubleSide,
                flatShading: true,
                shininess: 10
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.y = -5; 
            modelGroup.add(mesh);

            currentBaseHeights = [
                currentBaseHeights[0] + thickNW,
                currentBaseHeights[1] + thickSW,
                currentBaseHeights[2] + thickSE,
                currentBaseHeights[3] + thickNE
            ];
        }
    }

    function processImagePixels(url) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas');
                const ctx = cvs.getContext('2d');
                cvs.width = 1; cvs.height = 100;
                ctx.drawImage(img, img.width/2, 0, 1, img.height, 0, 0, 1, 100);
                const data = ctx.getImageData(0, 0, 1, 100).data;
                let layers = [];
                for(let i=0; i<100; i++) {
                    const r = data[i*4], g = data[i*4+1], b = data[i*4+2];
                    layers.push((g > r && g > b) ? "sand" : "mud");
                }
                resolve(compressLayers(layers));
            };
            img.src = url;
        });
    }

    function compressLayers(arr) {
        let res = [], cur = arr[0], count = 0;
        arr.forEach(v => { if(v === cur) count++; else { res.push({type:cur, ratio:count/100}); cur=v; count=1; }});
        res.push({type:cur, ratio:count/100});
        return res;
    }

    // 頂点を方位データに基づいて変形させる関数
    function createDeformedBox(size, baseH, thicks) {
        const boxGeo = new THREE.BoxGeometry(size, 1, size, 1, 1, 1);
        const pos = boxGeo.attributes.position;
        
        for(let i=0; i<pos.count; i++) {
            const x = pos.getX(i);
            const z = pos.getZ(i);
            const y = pos.getY(i);
            
            let bH = 0, tH = 0;
            // XZ平面の座標で四隅（NW, SW, SE, NE）を特定
            if(x < 0 && z < 0) { bH = baseH[0]; tH = thicks[0]; } // NW
            else if(x < 0 && z > 0) { bH = baseH[1]; tH = thicks[1]; } // SW
            else if(x > 0 && z > 0) { bH = baseH[2]; tH = thicks[2]; } // SE
            else { bH = baseH[3]; tH = thicks[3]; } // NE
            
            // BoxGeometryの元のYが正(0.5)なら上面、負(-0.5)なら底面として配置
            if(y > 0) pos.setY(i, bH + tH);
            else pos.setY(i, bH);
        }
        pos.needsUpdate = true;
        boxGeo.computeVertexNormals();
        return boxGeo;
    }

    window.onload = init;
</script>
</body>
</html>
